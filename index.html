    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; min-height: 100vh; overflow-x: hidden; }
    
    /* --- FONDO GIRATORIO --- */
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .bg-watermark-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-watermark-rotator { position: absolute; top: 50%; left: 50%; width: 150vmax; height: 150vmax; margin-top: -75vmax; margin-left: -75vmax; opacity: 0.12; background-image: var(--logo-base64); background-size: contain; background-repeat: no-repeat; background-position: center; animation: spin-slow 80s linear infinite; will-change: transform; }
    .logo-img { background-image: var(--logo-base64); background-size: contain; background-repeat: no-repeat; background-position: center; }

    /* --- ESTILOS COMPONENTES --- */
    .panel { background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(12px); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.6); }
    .cell-base { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(255,255,255,0.4); cursor: pointer; height: 100%; width: 100%; position: relative; transition: all 0.1s ease; min-height: 38px; }
    .cell-base:hover { background-color: rgba(255,255,255,0.5); border-color: #cbd5e1; }
    .descanso-yellow { background-color: rgba(254, 249, 195, 0.85) !important; border: 1px solid #fde047 !important; cursor: not-allowed !important; }
    .descanso-red { background-color: rgba(254, 226, 226, 0.85) !important; border: 1px solid #f87171 !important; color: #991b1b !important; font-weight: bold; cursor: not-allowed !important; }
    .sel-selected { background-color: #fef08a !important; color: #854d0e !important; border: 2px solid #eab308 !important; font-weight: 800; z-index: 10; }
    .sel-confirmed { background-color: #dbeafe !important; color: #1e40af !important; border: 2px solid #2563eb !important; font-weight: 800; }
    .pap-selected { background-color: #ccfbf1 !important; color: #115e59 !important; border: 2px solid #14b8a6 !important; font-weight: 800; z-index: 10; }
    .ccr-selected { background-color: #fce7f3 !important; color: #be185d !important; font-weight: 800; border: 2px solid #db2777 !important; z-index: 10; }
    .ccr-blocked { background-color: rgba(55, 65, 81, 0.8) !important; color: #d1d5db !important; text-decoration: line-through; border: 1px solid #1f2937 !important; cursor: not-allowed !important; }
    .ccr-incompatible { background-color: rgba(255, 241, 242, 0.8) !important; color: #ef4444 !important; border: 2px dashed #f87171 !important; cursor: not-allowed !important; opacity: 0.8; }
    .ccr-high { background-color: rgba(220, 252, 231, 0.8) !important; color: #15803d !important; font-weight: 600; border: 1px solid #86efac !important; }
    .ccr-medium { background-color: rgba(255, 237, 213, 0.8) !important; color: #c2410c !important; font-weight: 600; border: 1px solid #fdba74 !important; }
    .ccr-low { background-color: rgba(254, 226, 226, 0.8) !important; color: #b91c1c !important; font-weight: 600; border: 1px solid #fca5a5 !important; }
    .rm-day-inside { background-color: rgba(224, 242, 254, 0.9) !important; border: 2px solid #0ea5e9 !important; color: #075985 !important; font-weight: 800; cursor: not-allowed !important; }
    .rm-day-outside { border: 2px dashed #0ea5e9 !important; box-shadow: inset 0 0 0 1px rgba(14, 165, 233, 0.25); }
    
    .cupo-badge { font-size: 9px; padding: 1px 4px; border-radius: 4px; color: white; margin-top: 2px; font-weight: bold;}
    .cupo-ok { background-color: #4ade80; } .cupo-low { background-color: #facc15; color: #854d0e; } .cupo-empty { background-color: #ef4444; } 
    .grid-cols-13 { grid-template-columns: repeat(13, minmax(0, 1fr)); }
    .rotation-board-grid { grid-template-columns: repeat(13, minmax(2.75rem, 1fr)); }
    .rotation-auto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .rotation-composition-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .rotation-search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .rotation-vision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .rotation-table { table-layout: fixed; min-width: 860px; }
    .rotation-wrap { overflow-wrap: anywhere; word-break: break-word; }
    
    .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 10px; }
    .custom-select { background-color: rgba(255,255,255,0.8); border: 1px solid rgba(204,204,204,0.8); border-radius: 6px; padding: 4px 8px; font-size: 11px; outline: none; width: 100%; backdrop-filter: blur(4px); font-weight: bold; }
    .toggle-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .toggle-on { background-color: #dcfce7; color: #166534; border-color: #86efac; }
    .toggle-off { background-color: rgba(243, 244, 246, 0.8); color: #6b7280; border-color: #e5e7eb; }
    .custom-scroll { scrollbar-width: thin; scrollbar-color: rgba(100,116,139,0.75) rgba(226,232,240,0.7); scrollbar-gutter: stable; }
    .custom-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(226,232,240,0.7); border-radius: 999px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.8); border-radius: 999px; border: 2px solid rgba(226,232,240,0.7); }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(71,85,105,0.9); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* --- IMPRESIÓN A3 --- */
    @media print { 
        @page { size: A3 landscape; margin: 15mm; } 
        body { background: white !important; } 
        body * { visibility: hidden; } 
        .print-area, .print-area * { visibility: visible; color: black; } 
        .print-area { position: absolute; left: 0; top: 0; width: 100%; height: auto; } 
        .no-print { display: none !important; } 
        .print-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; width: 100%; } 
    }
</style>

const ROTATION_GROUPS = ['A', 'B', 'C'];
const ROTATION_SUBS = [1, 2, 3, 4];
const ALL_ROTATION_UNITS = ROTATION_GROUPS.flatMap(g => ROTATION_SUBS.map(n => `${g}${n}`));
const DEFAULT_ROTATION_ASSIGNMENT_UNIT_SEQUENCE = ['A1', 'B1', 'C1', 'A2', 'B2', 'C2', 'A3', 'B3', 'C3', 'A4', 'B4', 'C4'];
const buildRotationSequence = (startPos = 1) => {
    const idx = ROTATION_BASE_SEQUENCE.indexOf(Number(startPos));
    if (idx === -1) return ROTATION_BASE_SEQUENCE;
    return [...ROTATION_BASE_SEQUENCE.slice(idx), ...ROTATION_BASE_SEQUENCE.slice(0, idx)];
};
const getRotationBlockContent = (step) => {
    const groupOffset = step % 3;
    const rotatedGroups = [
        ROTATION_GROUPS[(0 + groupOffset) % 3],
        ROTATION_GROUPS[(1 + groupOffset) % 3],
        ROTATION_GROUPS[(2 + groupOffset) % 3]
    ];
    const subOffset = step % 4;
    const getSub = (val) => ((val - 1 + subOffset) % 4) + 1;
    return rotatedGroups.map(group => ({ label: group, subs: [getSub(1), getSub(2), getSub(3), getSub(4)] }));
};
const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
const AUTO_A_PROFILE_SEGMENTS = [
    { key: 'multAInvierno', label: 'Invierno / cierre', months: [0, 11], defaultValue: 3 },
    { key: 'multABaja', label: 'Meses bajos', months: [1, 9, 10], defaultValue: 1 },

];
const roundToOneDecimal = (value) => Math.round((Number(value) || 0) * 10) / 10;
const getAutoAProfileSegmentForMonth = (monthIdx) => AUTO_A_PROFILE_SEGMENTS.find(segment => segment.months.includes(monthIdx)) || AUTO_A_PROFILE_SEGMENTS[1];
const getLegacyMonthlyMultiplierA = (cfg, monthIdx) => {
    const legacyValue = Number(cfg?.[`multA_${monthIdx}`]);
    return Number.isFinite(legacyValue) && legacyValue > 0 ? legacyValue : null;
};
const getAutoPriorityMultiplierA = (cfg, monthIdx) => {
    const segment = getAutoAProfileSegmentForMonth(monthIdx);
    const profileValue = Number(cfg?.[segment.key]);
    if (Number.isFinite(profileValue) && profileValue > 0) return profileValue;
    const legacyValue = getLegacyMonthlyMultiplierA(cfg, monthIdx);
    if (legacyValue != null) return legacyValue;
    return segment.defaultValue;
};
const normalizeAutoAMultipliers = (cfg = {}) => {
    const next = { ...cfg };
    AUTO_A_PROFILE_SEGMENTS.forEach(segment => {
        const currentValue = Number(next[segment.key]);
        if (Number.isFinite(currentValue) && currentValue > 0) {
            next[segment.key] = roundToOneDecimal(currentValue);
            return;
        }
        const legacyValues = segment.months.map(monthIdx => getLegacyMonthlyMultiplierA(next, monthIdx)).filter(v => v != null);
        const fallback = legacyValues.length > 0 ? (legacyValues.reduce((sum, value) => sum + value, 0) / legacyValues.length) : segment.defaultValue;
        next[segment.key] = roundToOneDecimal(fallback);
    });
    for (let monthIdx = 0; monthIdx < 12; monthIdx++) {
        next[`multA_${monthIdx}`] = roundToOneDecimal(getAutoPriorityMultiplierA(next, monthIdx));
    }
    next.rotationUnitSequence = normalizeRotationUnitSequence(next.rotationUnitSequence);
    return next;
};
const normalizeRotationUnitSequence = (sequence) => {
    const incoming = Array.isArray(sequence) ? sequence : [];
    const valid = incoming.filter(unit => ALL_ROTATION_UNITS.includes(unit));
    const unique = [];
    valid.forEach(unit => {
        if (!unique.includes(unit)) unique.push(unit);
    });
    DEFAULT_ROTATION_ASSIGNMENT_UNIT_SEQUENCE.forEach(unit => {
        if (!unique.includes(unit)) unique.push(unit);
    });
    return unique.slice(0, ALL_ROTATION_UNITS.length);
};
const buildRotationAssignmentSlots = (totalMte, unitSequence = DEFAULT_ROTATION_ASSIGNMENT_UNIT_SEQUENCE) => {
    const normalizedTotal = Math.max(0, Number(totalMte) || 0);
    const slots = [];
    if (normalizedTotal <= 0) return slots;
    const normalizedSequence = normalizeRotationUnitSequence(unitSequence);
    const seatsPerUnit = Math.ceil(normalizedTotal / (13 * normalizedSequence.length));
    for (let seat = 1; seat <= seatsPerUnit; seat++) {
        for (const unit of normalizedSequence) {
            for (let block = 1; block <= 13; block++) {
                slots.push({
                    block,
                    unit,
                    seat,
                    label: `Bloque ${block} · ${unit} · Puesto ${seat}`
                });
                if (slots.length >= normalizedTotal) return slots;
            }
        }
    }
    return slots;
};

const getEasterDate = (year) => {
    const a = year % 19;
    const b = Math.floor(year / 100);
    const c = year % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19 * a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2 * e + 2 * i - h - k) % 7;
    const m = Math.floor((a + 11 * h + 22 * l) / 451);
    const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
    const day = ((h + l - 7 * m + 114) % 31) + 1;
    return new Date(year, month, day);
};

const posMod = (n, m) => ((n % m) + m) % m;

const buildFestivosSetForYear = (year, customHolidays = []) => {
    const fixed = ["0-1", "0-6", "4-1", "4-2", "4-15", "7-15", "9-12", "10-1", "10-9", "11-6", "11-8", "11-25"];
    const easter = getEasterDate(year);
    const juevesSanto = new Date(easter);
    juevesSanto.setDate(easter.getDate() - 3);
    const viernesSanto = new Date(easter);
    viernesSanto.setDate(easter.getDate() - 2);
    const all = [...fixed, `${juevesSanto.getMonth()}-${juevesSanto.getDate()}`, `${viernesSanto.getMonth()}-${viernesSanto.getDate()}`, ...(customHolidays || [])];
    return new Set(all);
};

const isBaseRestForGroup = (date, groupShift) => {
    const dow = date.getDay();
    const diff = dow === 0 ? 6 : dow - 1;
    const mon = new Date(date);
    mon.setDate(date.getDate() - diff);
    mon.setHours(0, 0, 0, 0);
    const wb = Math.round((mon - ANCHOR_MONDAY) / MS_PER_WEEK);
    let si = (wb - groupShift) % 4;
    if (si < 0) si += 4;
    return SEQUENCE[si].includes(dow);
};

const getAdjustedRmDateForScenario = (year, vacationRow, pfaOpt, groupShift, restChecker = isBaseRestForGroup) => {
    const base = getRmDateForScenario(year, vacationRow, pfaOpt);
    if (!base) return null;
    const adjusted = new Date(base);
    adjusted.setHours(0, 0, 0, 0);
    let safety = 0;
    while (restChecker(adjusted, groupShift) && safety < 31) {
        adjusted.setDate(adjusted.getDate() - 1);
        safety++;
    }
    return adjusted;
};

const getAdjustedPfaRangeForScenario = (year, pfaOpt, targetGroupShift) => {
    const originalStart = new Date(year, pfaOpt.start.m, pfaOpt.start.d);
    let actualStart = new Date(originalStart);
    const originalEnd = new Date(year, pfaOpt.end.m, pfaOpt.end.d);
    const durationMs = originalEnd.getTime() - originalStart.getTime();
    const isDecemberPfa11To31 = pfaOpt.start.m === 11 && pfaOpt.start.d === 11;
    let safety = 0;
    while (isBaseRestForGroup(actualStart, targetGroupShift) && safety < 10) {
        actualStart.setDate(actualStart.getDate() + (isDecemberPfa11To31 ? -1 : 1));
        safety++;
    }
    const pfaStart = actualStart.getTime();
    let pfaEnd = pfaStart + durationMs;
    if (isDecemberPfa11To31 && actualStart.getTime() < originalStart.getTime()) {
        pfaEnd = originalEnd.getTime();
    }
    return { pfaStart, pfaEnd };
};

const getVacationRangesForScenario = (year, vacationRow, pfaOpt, groupShift) => {
    const summerStart = new Date(year, vacationRow.summer.start.m, vacationRow.summer.start.d).getTime();
    const summerEnd = new Date(year, vacationRow.summer.end.m, vacationRow.summer.end.d).getTime();
    const pfaRange = getAdjustedPfaRangeForScenario(year, pfaOpt, groupShift);
    return { summerStart, summerEnd, pfaStart: pfaRange.pfaStart, pfaEnd: pfaRange.pfaEnd };
};

const isVacationForScenario = (date, ranges) => {
    const t = date.getTime();
    return (t >= ranges.summerStart && t <= ranges.summerEnd) || (t >= ranges.pfaStart && t <= ranges.pfaEnd);
};

const buildRedDaysSetBForScenario = (year, groupShift, subGroupIdx) => {
    const reds = new Set();
    const firstDayOfYear = new Date(year, 0, 1);
    const daysToFirstMonday = firstDayOfYear.getDay() === 1 ? 0 : (firstDayOfYear.getDay() === 0 ? 1 : 8 - firstDayOfYear.getDay());
    const firstMonday = new Date(year, 0, 1 + daysToFirstMonday);
    firstMonday.setHours(0, 0, 0, 0);

    for (let w = -4; w <= 56; w++) {
        const currentMonday = new Date(firstMonday);
        currentMonday.setDate(firstMonday.getDate() + w * 7);
        const weeksBetween = Math.round((currentMonday - ANCHOR_MONDAY) / MS_PER_WEEK);
        const groupWeek = posMod(weeksBetween - groupShift, 24);
        const phase = groupWeek % 4;
        const cycle = Math.floor(groupWeek / 4);
        let daysOffset = [];
        if (phase === 1) {
            daysOffset = (subGroupIdx === posMod(cycle + 1, 6)) ? [0, 1] : ((subGroupIdx === posMod(cycle + 3, 6)) ? [3, 4] : []);
        } else if (phase === 2) {
            daysOffset = (subGroupIdx === posMod(cycle + 5, 6)) ? [2] : [];
        }
        for (const offset of daysOffset) {
            const targetDate = new Date(currentMonday);
            targetDate.setDate(currentMonday.getDate() + offset);
            if (targetDate.getFullYear() === year) {
                reds.add(`${targetDate.getMonth()}-${targetDate.getDate()}`);
            }
        }
    }
    return reds;
};

const buildCyclesForScenarioC = (year, groupShift) => {
    const rawList = [];
    let current = new Date(year, 0, 1);
    current.setDate(current.getDate() + (current.getDay() === 0 ? 1 : (8 - current.getDay()) % 7));
    while (current.getFullYear() <= year) {
        const weeksBetween = Math.round((current - ANCHOR_MONDAY) / MS_PER_WEEK);
        let seqIdx = (weeksBetween - groupShift) % 4;
        if (seqIdx < 0) seqIdx += 4;
        if (seqIdx === 0) {
            const start = new Date(current);
            const end = new Date(current);
            end.setDate(start.getDate() + 14);
            rawList.push({ start, end });
        }
        current.setDate(current.getDate() + 7);
    }
    return rawList;
};

const computeAnnualBalance = ({ year, groupShift, targetDays, vacationRanges, specificRestSet = null, specificCycle = null, workRule = 'classic', includeVacationOnWork = false, rmDate = null, rmInside = false }) => {
    let workDays = 0;
    let baseRests = 0;
    let extraRests = 0;
    let vacPfaDays = 0;
    let vacOnWorkDays = 0;
    const rmDayId = rmDate ? `${rmDate.getMonth()}-${rmDate.getDate()}` : null;
    const start = new Date(year, 0, 1);
    const end = new Date(year, 11, 31);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const dayId = `${d.getMonth()}-${d.getDate()}`;
        const isBase = isBaseRestForGroup(d, groupShift);
        const t = d.getTime();
        const isSpecific = specificRestSet ? specificRestSet.has(dayId) : (specificCycle ? (t >= specificCycle.start.getTime() && t <= specificCycle.end.getTime()) : false);
        const isRmOutside = !rmInside && rmDayId === dayId;
        const isVac = vacationRanges ? isVacationForScenario(d, vacationRanges) : false;
        const isPotentialWork = !isBase && !isSpecific;
        const isVacationOnWorkDay = isPotentialWork && (isVac || isRmOutside);
        if (isVac) vacPfaDays++;
        if (isBase) baseRests++;
        else if (isSpecific) extraRests++;

        if (workRule === 'rest_and_specific_only') {
            if (isPotentialWork) {
                if (isVacationOnWorkDay && includeVacationOnWork) vacOnWorkDays++;
                else if (!isVacationOnWorkDay) workDays++;
            }
        } else if (isPotentialWork && !isVac && !isRmOutside) {
            workDays++;
        }
    }
    const diff = workDays - targetDays;
    return {
        workDays,
        baseRests,
        extraRests,
        vacPfaDays,
        vacOnWorkDays,
        creditDays: diff > 0 ? diff : 0,
        debitDays: diff < 0 ? Math.abs(diff) : 0,
        diff
    };
};

const buildCCRFixedDaysSet = (year, groupShift, vacationRanges, maxDays = 10, rmDate = null, rmInside = false) => {
    const selected = new Set();
    const rmDayId = rmDate ? `${rmDate.getMonth()}-${rmDate.getDate()}` : null;
    const start = new Date(year, 0, 1);
    const end = new Date(year, 11, 31);
    for (let d = new Date(start); d <= end && selected.size < maxDays; d.setDate(d.getDate() + 1)) {
        const isBase = isBaseRestForGroup(d, groupShift);
        const isVac = isVacationForScenario(d, vacationRanges);
        const dayId = `${d.getMonth()}-${d.getDate()}`;
        const isRmRest = rmInside && rmDayId === dayId;
        if (isBase || isVac || isRmRest) continue;
        selected.add(dayId);
    }
    return selected;
};

// --- 3. MÓDULO DE AJUSTES GLOBALES ---
function Ajustes({ config, setConfig, onBack, onSaveConfig }) {
    const [showHelp, setShowHelp] = useState(false);
    const [saveStatus, setSaveStatus] = useState("");
    const showStatus = useCallback((msg) => {
        setSaveStatus(msg);
        setTimeout(() => setSaveStatus(""), 2500);
    }, []);
    const handleChange = (key, value) => setConfig(prev => normalizeAutoAMultipliers({ ...prev, [key]: Number(value) }));
    const toPressureLevel = (pct) => Math.round(((Number(pct) || 0) / PRESSURE_LEVEL_UNIT) * 10) / 10;
    const handlePressureLevelChange = (key, value) => {
        const level = Number(value);
        if (Number.isNaN(level)) return;
        const pct = Math.round((level * PRESSURE_LEVEL_UNIT) * 100) / 100;
        setConfig(prev => normalizeAutoAMultipliers({ ...prev, [key]: pct }));
    };
    const handleAutoProfileChange = (key, value) => {
        const parsed = Number(value);
        if (Number.isNaN(parsed)) return;
        setConfig(prev => normalizeAutoAMultipliers({ ...prev, [key]: parsed }));
    };
    const applyAutoProfileDefaults = () => {
        setConfig(prev => normalizeAutoAMultipliers({
            ...prev,
            ...AUTO_A_PROFILE_SEGMENTS.reduce((acc, segment) => ({ ...acc, [segment.key]: segment.defaultValue }), {})
        }));
    };
    const handleRotationExcelImport = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (typeof XLSX === 'undefined') {
            showStatus('No se pudo cargar el lector de Excel');
            e.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const data = new Uint8Array(reader.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                if (!sheetName) throw new Error('sheet');
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });
                const dneList = rows
                    .map(row => Array.isArray(row) ? String(row[0] ?? '').trim() : '')
                    .filter(Boolean);
                if (dneList.length === 0) throw new Error('empty');
                setConfig(prev => normalizeAutoAMultipliers({
                    ...prev,
                    globalMTE: dneList.length,
                    rotationDneList: dneList,
                    rotationDneFileName: file.name
                }));
                showStatus(`Excel cargado (${dneList.length} DNE). Plantilla MTE ajustada a ${dneList.length}.`);
            } catch (_) {
                showStatus('Error al leer Excel: usa una sola columna con un DNE por fila');
            }
        };
        reader.onerror = () => showStatus('Error al leer el Excel');
        reader.readAsArrayBuffer(file);
        e.target.value = '';
    };
    const clearRotationExcel = () => {
        setConfig(prev => normalizeAutoAMultipliers({
            ...prev,
            rotationDneList: [],
            rotationDneFileName: ''
        }));
        showStatus('Listado de DNE eliminado');
    };
    const moveRotationUnit = (fromIdx, direction) => {
        setConfig(prev => {
            const current = normalizeRotationUnitSequence(prev.rotationUnitSequence);
            const toIdx = fromIdx + direction;
            if (toIdx < 0 || toIdx >= current.length) return prev;
            const nextSeq = [...current];
            const tmp = nextSeq[fromIdx];
            nextSeq[fromIdx] = nextSeq[toIdx];
            nextSeq[toIdx] = tmp;
            return normalizeAutoAMultipliers({ ...prev, rotationUnitSequence: nextSeq });
        });
    };
    const resetRotationUnitSequence = () => {
        setConfig(prev => normalizeAutoAMultipliers({ ...prev, rotationUnitSequence: DEFAULT_ROTATION_ASSIGNMENT_UNIT_SEQUENCE }));
        showStatus('Secuencia de rotación restaurada');
    };
    const rotationUnitSequence = useMemo(() => normalizeRotationUnitSequence(config.rotationUnitSequence), [config.rotationUnitSequence]);
    const handleSave = () => {
        const saved = typeof onSaveConfig === 'function' ? onSaveConfig(config) : false;
        showStatus(saved ? "Configuración guardada" : "Error al guardar");
    };
    const handleExportTxt = () => {
        try {
            const text = JSON.stringify(config, null, 2);
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const now = new Date();
            const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `scmm_ajustes_${stamp}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            showStatus("Ajustes exportados");
        } catch (err) {
            showStatus("Error al exportar");
        }
    };
    const handleImportTxt = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const raw = String(reader.result || '');
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('invalid');
                setConfig(prev => {
                    const next = { ...prev };
                    Object.keys(prev).forEach((key) => {
                        if (!(key in parsed)) return;
                        const incoming = parsed[key];
                        const current = prev[key];
                        if (typeof current === 'number') {
                            const n = Number(incoming);
                            next[key] = Number.isFinite(n) ? n : current;
                        } else if (Array.isArray(current)) {
                            next[key] = Array.isArray(incoming) ? incoming : current;
                        } else {
                            next[key] = incoming;
                        }
                    });
                    return normalizeAutoAMultipliers(next);
                });
                showStatus("Ajustes importados");
            } catch (err) {
                showStatus("Error al importar: formato inválido");
            }
        };
        reader.onerror = () => showStatus("Error al leer el archivo");
        reader.readAsText(file, 'utf-8');
        e.target.value = '';
    };
    
    return (
        <div className="min-h-screen p-4 md:p-8 flex flex-col relative z-10 w-full max-w-6xl mx-auto">

                        <p>Este panel es el <b>cerebro de la aplicación</b>. Modificar valores aquí cambia en tiempo real el comportamiento de todos los simuladores de la suite.</p>
                        <div className="bg-blue-50 p-4 rounded-xl">
                            <h4 className="font-bold text-blue-900 mb-1">1. Datos Generales</h4>
                            <p>El <b>MTE Total</b> (Plantilla) alimenta la rotación y la capacidad de las quincenas. El límite de solapamiento dicta cuándo una persona no puede pedir un periodo de 15 días en el Cal. C porque "choca" con sus vacaciones base.</p>
                        </div>
                        <div className="bg-orange-50 p-4 rounded-xl">
                            <h4 className="font-bold text-orange-900 mb-1">2. Presión Base (Calendario A)</h4>
                            <p>Los días laborables sufren menos presión de petición que los festivos. Además de la estacionalidad, ahora puedes reforzar <b>puentes</b>, <b>viernes</b> y <b>martes</b> para afinar mejor cómo se agotan los cupos de días sueltos.</p>
                        </div>
	                        <div className="bg-purple-50 p-4 rounded-xl">
	                            <h4 className="font-bold text-purple-900 mb-1">3. Cupos y Preferencias Mensuales</h4>
	                            <p>Aquí inyectas los cupos reales del año actual. El <b>Peso (C)</b> permite jugar con la cascada. La <b>Preferencia Auto (A)</b> ahora se ajusta por tramos estacionales, para evitar tocar 12 meses uno a uno.</p>
	                        </div>
	                    </div>
	                </Modal>
	            )}

            <div className="panel p-4 flex justify-between items-center mb-6 shrink-0 bg-white/70 backdrop-blur-xl">
                <div className="flex items-center gap-3">
                    <button onClick={onBack} className="p-2 bg-blue-100 hover:bg-blue-200 text-blue-800 rounded-full transition-colors"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg></button>
                    <h1 className="text-2xl font-black text-blue-900 flex items-center gap-2">⚙️ Ajustes del Motor de Simulación</h1>
                </div>
                <div className="flex items-center gap-2">
                    {saveStatus && <span className={`text-[11px] font-bold ${saveStatus.includes('Error') ? 'text-red-700' : 'text-green-700'}`}>{saveStatus}</span>}
                    <input id="importConfigTxt" type="file" accept=".txt,.json,text/plain,application/json" className="hidden" onChange={handleImportTxt} />
                    <button onClick={handleExportTxt} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold shadow-md transition-colors">⬇️ Exportar Ajustes</button>

                    <button onClick={handleSave} className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl text-xs font-bold shadow-md transition-colors">💾 Guardar</button>
                    <button onClick={() => setShowHelp(true)} className="px-4 py-2 bg-gray-800 hover:bg-gray-900 text-white rounded-xl text-xs font-bold shadow-md">❓ Ayuda</button>
                </div>
            </div>
            
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-y-auto pb-10">
                <div className="flex flex-col gap-6">
	                    <div className="panel p-5 bg-white/60 border-gray-200">

                            <div><label className="text-[10px] font-bold text-gray-600 block mb-1">MÁX. SOLAPAMIENTO PERMITIDO (Días)</label><input type="number" className="custom-select" value={config.maxSolapamiento} onChange={e => handleChange('maxSolapamiento', e.target.value)} /></div>

	                    <div className="panel p-5 bg-slate-50/70 border-slate-200">

                            <p className="text-[11px] text-gray-600">Sube un Excel con <b>una sola columna</b> y <b>un DNE por fila</b>. Ese listado se usará luego para generar el orden de rotación con el número ONCE y <b>ajustará automáticamente la plantilla MTE total</b> al número de registros leídos.</p>
	                            <div className="bg-white/80 border border-slate-200 rounded-xl p-3 space-y-2">

	                                </div>
	                                <div className="flex justify-between items-center">
	                                    <span className="text-[10px] font-bold text-gray-600 uppercase">DNE leídos</span>
	                                    <span className="text-[11px] font-black text-blue-700">{Array.isArray(config.rotationDneList) ? config.rotationDneList.length : 0}</span>

	                                    <label className="text-[10px] font-bold text-slate-700 uppercase">Secuencia unidades del sorteo</label>

	                                </div>
	                                <p className="text-[10px] text-gray-500 mb-2">El orden por defecto queda `A1 -> B1 -> C1 -> A2 ...`. Puedes mover cada unidad para ajustar la secuencia real.</p>
	                                <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">

// --- 4. COMPONENTE MES VISUAL (GRID) ---
function Month({ tipo, monthIdx, year, groupShift, redDaysSet, getCupo, getCupoPAP, selectedDays, selectedPAPDays, papModeEnabled, onDayClick, onPapDayClick, isConfirmed, festivos, anchorMonday, sequence, getVacationStatus, getRMStatus, cyclesC, selectedCycleC }) {
    const daysInMonth = new Date(year, monthIdx + 1, 0).getDate();
    const firstDayDate = new Date(year, monthIdx, 1);
    const firstDayWeekday = firstDayDate.getDay();
    const firstDayIdx = firstDayWeekday === 0 ? 6 : firstDayWeekday - 1; 
    const festivosSet = useMemo(() => new Set(festivos), [festivos]);
    const selectedDaysSet = useMemo(() => new Set(selectedDays), [selectedDays]);
    const selectedPAPDaysSet = useMemo(() => new Set(selectedPAPDays), [selectedPAPDays]);
    const effectivePapMode = tipo === 'C' ? true : papModeEnabled;
    const days = [];

    for (let d = 1; d <= daysInMonth; d++) {
        const current = new Date(year, monthIdx, d);
        const dayOfWeek = current.getDay();
        const esSD = (dayOfWeek === 0 || dayOfWeek === 6);
        const dayId = `${monthIdx}-${d}`;
        const esF = festivosSet.has(dayId);
        
        const diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
        const currentMonday = new Date(current); currentMonday.setDate(current.getDate() - diffToMonday); currentMonday.setHours(0,0,0,0);
        const weeksBetween = Math.round((currentMonday - anchorMonday) / MS_PER_WEEK);
        let seqIdx = (weeksBetween - groupShift) % 4; if (seqIdx < 0) seqIdx += 4;
        
        const isDescansoA = sequence[seqIdx].includes(dayOfWeek);
        const isDescansoB = tipo === 'B' && redDaysSet.has(dayId);
        const currentCycle = tipo === 'C' ? cyclesC.find(c => current >= c.start && current <= c.end) : null;
        const isCCRBase = tipo === 'C' ? (seqIdx === 0 || seqIdx === 1 || (seqIdx === 2 && dayOfWeek === 1)) : false;
        const { isSummer, isPfa } = getVacationStatus(current);
        const { isRMDay, isRMInside } = getRMStatus ? getRMStatus(current) : { isRMDay: false, isRMInside: false };
        const isVacation = isSummer || isPfa;
        
        const cupo = getCupo(monthIdx, d, esSD, esF);
        const isSelectedA = tipo === 'A' && selectedDaysSet.has(dayId);
        const isSelectedC = tipo === 'C' && selectedCycleC && (current >= selectedCycleC.start && current <= selectedCycleC.end);
        const isSelectedPAP = selectedPAPDaysSet.has(dayId);
        const papCupoBase = getCupoPAP ? getCupoPAP(monthIdx, d, dayOfWeek) : 0;
        const papCupo = Math.max(0, papCupoBase - (isSelectedPAP ? 1 : 0));
        const papBlocked = isDescansoA || isDescansoB || isVacation || isSelectedA || isSelectedC || (isRMDay && isRMInside);

        let baseClass = "cell-base";
        if (tipo === 'C') {
            if (isSelectedC) baseClass += " ccr-selected";
            else if (isDescansoA) baseClass += " descanso-yellow";
            else if (isCCRBase && currentCycle) {
                baseClass += currentCycle.isIncompatible ? " bg-red-50 text-red-300" : ` ccr-${currentCycle.availabilityLevel}`;
            }
        } else {
            if (isDescansoB) baseClass += " descanso-red";
            else if (isDescansoA) baseClass += " descanso-yellow";
            else if (isSelectedA) baseClass += isConfirmed ? " sel-confirmed" : " sel-selected";
            else if (cupo === 0 && tipo === 'A') baseClass += " bg-red-50"; 
        }
        if (isRMDay && isRMInside) baseClass += " rm-day-inside";
        else if (isRMDay && !isRMInside) baseClass += " rm-day-outside";
        if (isSelectedPAP && !isSelectedC) baseClass += " pap-selected";

        let isOpacity60 = false;
        if (isVacation && !isSelectedA && !isSelectedC) isOpacity60 = true;
        if (tipo === 'A' && cupo === 0 && !isSelectedA && !isDescansoA && !isDescansoB) isOpacity60 = true;
        if (isRMDay && isRMInside && !isSelectedA && !isSelectedC) isOpacity60 = true;

        let badgeClass = cupo === 0 ? "cupo-empty" : (cupo <= 5 ? "cupo-low" : "cupo-ok");
        let papBadgeClass = papCupo === 0 ? "cupo-empty" : (papCupo <= 10 ? "cupo-low" : "cupo-ok");

        days.push({ d, dayId, dayOfWeek, isDescansoA, isDescansoB, isVacation, isSummer, isPfa, isRMDay, isRMInside, cupo, badgeClass, papCupoBase, papCupo, papBadgeClass, papBlocked, baseClass, isSelectedA, isOpacity60, esF, esSD });
    }

    return (
        <div className="bg-white/50 rounded-lg border border-white/60 p-2 md:p-3 shadow-sm flex flex-col min-h-[260px] relative z-10 backdrop-blur-md">
            <h3 className="text-[#2563eb] font-bold text-center text-xs md:text-sm capitalize mb-2 pb-1 border-b border-gray-100/50">{MESES[monthIdx]}</h3>
            <div className="grid grid-cols-7 gap-px text-center text-[10px] md:text-xs font-bold text-gray-500 mb-1">{['L','M','X','J','V','S','D'].map(d => <div key={d}>{d}</div>)}</div>
            <div className="grid grid-cols-7 grid-rows-6 gap-[1px] flex-1">
                {Array(firstDayIdx).fill(0).map((_, i) => <div key={`b-${i}`}></div>)}
                {days.map((day) => (
                    <div key={day.d} onClick={() => {
                        if (effectivePapMode) {
                            onPapDayClick(monthIdx, day.d, day.dayOfWeek, day.papBlocked, day.papCupoBase);
                            return;
                        }
                        if (tipo === 'B' || tipo === 'C' || day.isDescansoA || day.isDescansoB || (day.isVacation && !day.isSelectedA) || (day.isRMDay && day.isRMInside)) return; 
                        if (day.cupo > 0 || day.isSelectedA) onDayClick(monthIdx, day.d, day.esSD, day.esF, day.isDescansoA || day.isDescansoB, day.isVacation, day.isRMDay && day.isRMInside);
                    }} className={`${day.baseClass} ${day.isOpacity60 ? 'cursor-not-allowed opacity-60' : ''}`}>
                        <span className={`text-[11px] md:text-xs leading-none flex items-center justify-center ${day.esF || day.esSD ? 'text-red-500 font-bold' : (day.isDescansoB ? 'text-red-800 font-bold' : 'text-gray-800')}`}>
                            {day.d}{day.isSummer && <span className="icon-overlay">☀️</span>}{day.isPfa && <span className="icon-overlay">❄️</span>}{day.isRMDay && !day.isRMInside && <span className="icon-overlay">🩺</span>}
                        </span>
                        {effectivePapMode ? (
                            <div className={`cupo-badge ${day.papBadgeClass}`}>{day.papCupo}</div>
                        ) : (
                            tipo === 'A' && <div className={`cupo-badge ${day.badgeClass}`}>{day.cupo}</div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
}

function SimuladorEngine({ tipo, config, setConfig, onBack, onGoAnalysis, initialScenario, onInitialScenarioApplied }) {
    const [year, setYear] = useState(2027);
    const [block, setBlock] = useState(1);
    const [subBlockIdx, setSubBlockIdx] = useState(0);
    const [groupShift, setGroupShift] = useState(0); 
    const [subGroupIdx, setSubGroupIdx] = useState(0); 
    const [enableVacations, setEnableVacations] = useState(false);
    const [vacationRowId, setVacationRowId] = useState("");
    const [pfaIdx, setPfaIdx] = useState(0);
    const [rmStatus, setRmStatus] = useState("fuera");
    const [creditsEnabled, setCreditsEnabled] = useState(true);
    const [maxCredits, setMaxCredits] = useState(DEFAULT_FLEX_DAYS_A);
    const [selectedDays, setSelectedDays] = useState([]);
    const [selectedPAPDays, setSelectedPAPDays] = useState([]);
    const [papModeEnabled, setPapModeEnabled] = useState(false);
    const [isConfirmed, setIsConfirmed] = useState(false);
    const [selectedCycleC, setSelectedCycleC] = useState(null);
    const [showLogica, setShowLogica] = useState(false);
    const [showHelp, setShowHelp] = useState(false);
    const appliedScenarioTokenRef = useRef(null);

    useEffect(() => {
        if (!initialScenario || initialScenario.tipo !== tipo) return;
        if (appliedScenarioTokenRef.current === initialScenario.token) return;

        const safeYear = Number(initialScenario.year);
        if (Number.isFinite(safeYear)) setYear(safeYear);

        const safeGroupShift = Number(initialScenario.groupShift);
        if (Number.isFinite(safeGroupShift) && safeGroupShift >= 0 && safeGroupShift <= 3) {
            setGroupShift(safeGroupShift);
        }

        const safeSubGroupIdx = Number(initialScenario.subGroupIdx);
        if (tipo === 'B' && Number.isFinite(safeSubGroupIdx) && safeSubGroupIdx >= 0 && safeSubGroupIdx <= 5) {
            setSubGroupIdx(safeSubGroupIdx);
        } else {
            setSubGroupIdx(0);
        }

        const vacIdNum = Number(initialScenario.vacationRowId);
        if (Number.isFinite(vacIdNum) && vacIdNum > 0) {
            setEnableVacations(true);
            setVacationRowId(String(vacIdNum));

    const isBridgeDayA = useCallback((date) => {

        const next = new Date(date); next.setDate(date.getDate() + 1); next.setHours(0, 0, 0, 0);
        const betweenTwoHolidays = isHolidayDateA(prev) && isHolidayDateA(next);

        const mondayOffset = dow === 0 ? 6 : dow - 1;
        const monday = new Date(date); monday.setDate(date.getDate() - mondayOffset); monday.setHours(0, 0, 0, 0);
        const friday = new Date(monday); friday.setDate(monday.getDate() + 4); friday.setHours(0, 0, 0, 0);
        const sameWeekLongWeekend = isHolidayDateA(monday) || isHolidayDateA(friday);

    const getFactorPresionA = useCallback((m, d, esSD, esF) => {
        const date = new Date(year, m, d);
        const t = date.getTime();
        const isSummerCore = (m === 6 || m === 7);
        const isSummerShoulder = (m === 5 && d >= 15) || (m === 8 && d <= 15);
        const isWinter = (m === 11 && d >= 20);
        const isSemanaSanta = (t >= semanaSantaRange.start && t <= semanaSantaRange.end);
        let factor = config.presionLab;

        if (isSummerCore) factor = esSD ? config.presionAltaSD : config.presionAltaLab;
        else if (isSummerShoulder) factor = esSD ? (config.presionAltaSD - 5) : config.presionAltaLab;
        else if (isSemanaSanta) factor = config.presionSemanaSanta;
        else if (isWinter) factor = esSD ? config.presionInviernoSD : config.presionInviernoLab;
        else if (esF) factor = config.presionFes;
        else if (esSD) factor = config.presionSD;

        if (!esSD && !esF) {
            if (isBridgeDayA(date)) factor = Math.max(factor, Number(config.presionPuentes) || 0);
            if (date.getDay() === 5) factor = Math.max(factor, Number(config.presionViernes) || 0);
            if (date.getDay() === 2) factor = Math.max(factor, Number(config.presionMartes) || 0);

    }, [year, semanaSantaRange, config, isBridgeDayA]);

    const getMteDayBreakdown = useCallback((date) => {
        const t = date.getTime();
        let mteActivo = 0;
        let mteDescanso = 0;
        let mteVacPfa = 0;
        const safeGroupBase = (config.globalMTE || 2100) / 4;

        for (let g = 0; g < 4; g++) {
            if (isRestForGroup(date, g)) {
                mteDescanso += mtePorGrupo;
                continue;
            }
            let ausentesInGroup = 0;
            const grupoList = mtePersonasPorGrupo.get(g) || [];
            grupoList.forEach(p => {
                if ((t >= p.summerStart && t <= p.summerEnd) || (t >= p.pfaStart && t <= p.pfaEnd)) {
                    ausentesInGroup += (p.cohortMTE * (mtePorGrupo / safeGroupBase));
                }
            });
            const vacPfaInGroup = Math.min(mtePorGrupo, Math.max(0, ausentesInGroup));
            mteVacPfa += vacPfaInGroup;
            mteActivo += Math.max(0, mtePorGrupo - vacPfaInGroup);
        }

        return {
            active: Math.max(0, mteActivo),
            rest: Math.max(0, mteDescanso),
            vacation: Math.max(0, mteVacPfa)
        };
    }, [config.globalMTE, isRestForGroup, mtePersonasPorGrupo, mtePorGrupo]);

    const getActiveMteForDate = useCallback((date) => getMteDayBreakdown(date).active, [getMteDayBreakdown]);
    const getAutoPriorityForMonthA = useCallback((monthIdx) => getAutoPriorityMultiplierA(config, monthIdx), [config]);

    const autoAssignmentA = useMemo(() => {
        const emptyBreakdown = {
            lab: { total: 0, remaining: 0, consumed: 0 },
            sd: { total: 0, remaining: 0, consumed: 0 },
            fes: { total: 0, remaining: 0, consumed: 0 }
        };
        if (tipo !== 'A') return { total: 0, remaining: 0, consumed: 0, byType: emptyBreakdown, byDay: new Map() };

        const dayRows = [];
        const byType = {
            lab: { total: 0, remaining: 0, consumed: 0 },
            sd: { total: 0, remaining: 0, consumed: 0 },
            fes: { total: 0, remaining: 0, consumed: 0 }
        };
        let total = 0;

        for (let m = 0; m < 12; m++) {
            const daysInMonth = new Date(year, m + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, m, d);
                const esSD = date.getDay() === 0 || date.getDay() === 6;
                const esF = festivosSet.has(`${m}-${d}`);
                const dayId = `${m}-${d}`;
                const base = getBaseQuotaA(m, d, esSD, esF);
                const factor = getFactorPresionA(m, d, esSD, esF);
                const priority = factor * getAutoPriorityForMonthA(m);
                const typeKey = esF ? 'fes' : (esSD ? 'sd' : 'lab');
                const activeMte = getActiveMteForDate(date);
                const maxAuto = Math.max(0, Math.min(base, Math.floor(activeMte)));

                dayRows.push({ dayId, month: m, typeKey, base, priority, maxAuto, consumed: 0 });
                byType[typeKey].total += base;
                total += base;
            }
        }

        const allocateDemand = (filterFn, demand) => {
            let left = Math.max(0, Math.round(demand));
            const candidates = dayRows.filter(filterFn);
            const grouped = new Map();
            for (const row of candidates) {
                const key = row.priority.toFixed(6);
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(row);
            }

            const sortedKeys = Array.from(grouped.keys()).sort((a, b) => Number(b) - Number(a));
            for (const key of sortedKeys) {
                if (left <= 0) break;
                const rows = grouped.get(key) || [];
                const rooms = rows.map(r => Math.max(0, r.maxAuto - r.consumed));
                const totalRoom = rooms.reduce((sum, n) => sum + n, 0);
                if (totalRoom <= 0) continue;

                if (left >= totalRoom) {
                    rows.forEach((r, idx) => { r.consumed += rooms[idx]; });
                    left -= totalRoom;
                    continue;
                }

                const provisional = rows.map((r, idx) => {
                    const room = rooms[idx];
                    const exact = (room * left) / totalRoom;
                    const take = Math.min(room, Math.floor(exact));
                    return { r, room, take, remainder: exact - take };
                });

                let assigned = provisional.reduce((sum, p) => sum + p.take, 0);
                let pending = Math.max(0, left - assigned);
                provisional
                    .filter(p => p.room > p.take)
                    .sort((a, b) => b.remainder - a.remainder || b.room - a.room)
                    .forEach(p => {
                        if (pending <= 0) return;
                        p.take += 1;
                        pending -= 1;
                    });

                provisional.forEach(p => { p.r.consumed += p.take; });
                left = 0;
            }
            return left;
        };

        const mteUnits = Math.max(0, Math.round(mtePrecedenteTotal));
        const autoCreditsPerMTE = Math.max(0, Math.round(Number(config.creditosAutoA ?? DEFAULT_FLEX_DAYS_A)));
        const demandLab = mteUnits * REQUIRED_LAB_DAYS_A;
        const demandFlex = mteUnits * autoCreditsPerMTE;
        const pendingLab = allocateDemand(row => row.typeKey === 'lab', demandLab);
        const _pendingFlex = allocateDemand(() => true, demandFlex + pendingLab);

        const byDay = new Map();
        for (const row of dayRows) {
            byDay.set(row.dayId, row.consumed);
            byType[row.typeKey].consumed += row.consumed;
        }

        byType.lab.remaining = Math.max(0, byType.lab.total - byType.lab.consumed);
        byType.sd.remaining = Math.max(0, byType.sd.total - byType.sd.consumed);
        byType.fes.remaining = Math.max(0, byType.fes.total - byType.fes.consumed);

        const byMonth = Array.from({ length: 12 }, (_, idx) => ({
            mes: MESES[idx],
            total: 0,
            consumed: 0,
            remaining: 0
        }));
        for (const row of dayRows) {
            byMonth[row.month].total += row.base;
            byMonth[row.month].consumed += row.consumed;
        }
        byMonth.forEach(m => {
            m.remaining = Math.max(0, m.total - m.consumed);
        });

        const consumed = byType.lab.consumed + byType.sd.consumed + byType.fes.consumed;
        const remaining = Math.max(0, total - consumed);
        return { total, remaining, consumed, byType, byDay, byMonth, mteUnits, autoCreditsPerMTE, demandLab, demandFlex, pendingLab, pendingFlex: _pendingFlex };
    }, [tipo, year, festivosSet, config, getFactorPresionA, getActiveMteForDate, mtePrecedenteTotal, getBaseQuotaA, getAutoPriorityForMonthA]);

    const getCupoPAP = useCallback((m, d, dayOfWeek) => {
        let temporada = 'invierno';
        if (m === 5 && d > 15) temporada = 'junioQ2';
        else if (m === 6) temporada = 'julio';
        else if (m === 7) temporada = 'agosto';
        else if (m === 8) temporada = 'septiembre';

        const tipoDia = dayOfWeek === 6 ? 'sab' : (dayOfWeek === 0 ? 'dom' : 'lab');
        const key = PAP_CONFIG_KEYS[temporada]?.[tipoDia];
        const configured = key ? Number(config[key]) : NaN;
        if (Number.isFinite(configured) && configured >= 0) return configured;
        return CUPOS_PAP[temporada][tipoDia];
    }, [config]);

    const getCupoForDay = useCallback((m, d, esSD, esF) => {
        if (tipo === 'B' || tipo === 'C') return 100;
        const dayId = `${m}-${d}`;

        let final = base - autoConsumed;

    const logicaPrecedentesA = useMemo(() => {

            let fpLab = getFactorPresionA(m, 15, false, false);

            return { mes: MESES[m], activos: Math.round(mteActivo), ausentes: Math.round(mtePrecedenteTotal - mteActivo), consLab: Math.floor((mteActivo * fpLab * mult) / 100), consSD: Math.floor((mteActivo * fpSD * mult) / 100), consFes: Math.floor((mteActivo * fpFes * mult) / 100) };

    const vacationImpactA = useMemo(() => {
        const empty = {
            july: { vacPct: 0, restPct: 0, activePct: 0 },
            august: { vacPct: 0, restPct: 0, activePct: 0 },

        };
        if (tipo !== 'A' || mtePrecedenteTotal <= 0) return empty;

        const perMonth = Array.from({ length: 12 }, () => ({ vacPct: 0, restPct: 0, activePct: 0, days: 0 }));
        for (let m = 0; m < 12; m++) {
            const daysInMonth = new Date(year, m + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const breakdown = getMteDayBreakdown(new Date(year, m, d));

                perMonth[m].restPct += (breakdown.rest * 100) / mtePrecedenteTotal;

        const normalized = perMonth.map(m => {

        const annual = normalized.reduce((acc, m) => ({
            vacPct: acc.vacPct + m.vacPct,
            restPct: acc.restPct + m.restPct,
            activePct: acc.activePct + m.activePct
        }), { vacPct: 0, restPct: 0, activePct: 0 });

        return {
            july: normalized[6],
            august: normalized[7],
            annual: {
                vacPct: annual.vacPct / 12,
                restPct: annual.restPct / 12,
                activePct: annual.activePct / 12

        };
    }, [tipo, year, mtePrecedenteTotal, getMteDayBreakdown]);

    const fragmentsC = useMemo(() => {
        if (tipo !== 'C') return [];
        const safeGroupBase = (config.globalMTE || 2100) / 4;
        return mtePersonas
            .filter(p => p.group === groupShift)
            .map((p, idx) => ({
                id: `${p.parentId}-${idx}`,
                remainingMTE: p.cohortMTE * (mtePorGrupo / safeGroupBase),
                summerStart: p.summerStart,
                summerEnd: p.summerEnd,
